services:
  # 🚗 Node.js Fullstack Service (Backend + Frontend)
  - type: web
    name: next-lane-fullstack
    env: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: 'on'
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: /api
      - key: PYTHON_API_URL
        value: http://next-lane-python:10000
      - key: WHATSAPP_ENABLED
        value: "false"

  # 🐍 Python API Service (Internal Private Service)
  - type: web
    name: next-lane-python
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r python-api/requirements.txt
    startCommand: cd python-api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
